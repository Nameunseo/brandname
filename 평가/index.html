<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        img {
            width: 100%;
        }

        header {
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px;
            background: white;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .menu {
            display: flex;
            list-style: none;
            gap: 70px;
        }

        .menu a {
            text-decoration: none;
            color: black;
            font-size: 14px;
        }

        .sub {
            display: none;
        }


        .icon {
            display: flex;
            gap: 30px;
            width: 100px;
            cursor: pointer;
        }

        .logo {
            font-weight: bold;
            color: black;
        }

        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 999;
        }

        .popup-box {
            width: 400px;
            height: 400px;
            background-color: white;
            border-radius: 30px;
            padding: 30px;

            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .popup-box h2 {
            font-weight: bold;
            margin-bottom: 25px;
        }

        .popup-box input[type=text],
        .popup-box input[type=password] {
            width: 100%;
            height: 40px;
            border: 1px solid black;
            border-radius: 30px;
            margin-bottom: 20px;
            padding-left: 15px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .switch {
            position: relative;
            width: 50px;
            height: 30px;
            display: inline-block;
        }

        .switch input {
            display: none;
        }

        .slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ddd;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.4s;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            left: 3px;
            top: 5px;
            background: white;
            border-radius: 50%;
            transform: 0.4s;
        }

        .login-btn,
        .close-btn {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 30px;
            margin-bottom: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .login-btn {
            background-color: black;
            color: white;
        }

        input::placeholder {
            transition: 0.4s;
        }

        input:focus::placeholder {
            color: transparent;
        }

        .switch input:checked+.slider {
            background: green;
        }

        .switch input:checked+.slider::before {
            transform: translateX(20px);
        }
    </style>


</head>


<header>
    <div class="logo">
        <h1>BRAND NAME</h1>
    </div>
    <nav>
        <ul class="menu">
            <li class="menu-li">
                <a href="">HOME</a>

            </li>
            <li class="menu-li">
                <a href="">ABOUT</a>

            </li>
            <li class="menu-li">
                <a href="">SHOP</a>

            </li>
            <li class="menu-li">
                <a href="">CONTACT</a>

            </li>

        </ul>
    </nav>
    <div class="icon">
        <i class="fa-solid fa-user"></i>
    </div>
</header>

<body>
    <main>
        <img src="img/zara.jpg" alt="">
    </main>

    <div class="popup">
        <div class="popup-box">
            <h2>LOGIN</h2>
            <input type="text" placeholder="아이디">
            <input type="password" placeholder="비밀번호">
            <div class="remember">
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
                <span>아이디 기억하기</span>
            </div>
            <button class="login-btn">LOGIN</button>
            <button class="close-btn">닫기</button>
        </div>



    </div>



</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
    $(function () {
        $(".popup").hide();
        $(".icon").click(function () {
            $(".popup").fadeIn();
        });
        $(".close-btn").click(function () {
            $(".popup").fadeOut();
        });
    })
</script>

</html>
